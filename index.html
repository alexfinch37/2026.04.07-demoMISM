<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Feed</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  #feed-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #stream {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transition: filter 1.2s ease;
    filter: brightness(0.25);
  }

  #stream.bright {
    filter: brightness(1);
  }

  #bottle-popup {
    display: none;
    position: absolute;
    bottom: 30px;
    right: 30px;
    background: rgba(255,255,255,0.97);
    border-radius: 12px;
    padding: 16px;
    width: 210px;
    text-align: center;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #bottle-popup.visible {
    display: flex;
  }

  #bottle-popup img.bottle-img {
    width: 100%;
    height: 110px;
    object-fit: contain;
    border-radius: 6px;
  }

  #bottle-popup p {
    font-size: 12px;
    color: #374151;
    font-weight: 500;
  }

  #bottle-popup img.qr {
    width: 120px;
    height: 120px;
  }
</style>
</head>
<body>

<div id="feed-container">
  <img id="stream" src="/video_feed" alt="Live feed">

  <div id="bottle-popup">
    <p>Hydrate smarter.</p>
    <img class="bottle-img"
         src="https://images.rei.com/media/2e539f50-b96e-4428-94fd-e2b1e2c82c91?size=784x588"
         alt="Metal water bottle"
         onerror="this.style.display='none'">
    <p style="font-size:11px;color:#6b7280;">Scan for details</p>
    <img class="qr"
         src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://www.hydroflask.com"
         alt="QR code">
  </div>
</div>

<script>
  const POLL_MS = 500;
  const DIM_DELAY_MS = 10000;
  const BOTTLE_HIDE_DELAY_MS = 5000;

  let dimTimer = null;
  let bottleTimer = null;

  function isBottleDetected(detections) {
    return detections.some(d => d.label === 'bottle');
  }

  function updateUI(state) {
    const stream = document.getElementById('stream');
    const bottlePopup = document.getElementById('bottle-popup');

    // Brightness logic
    if (state.person_detected) {
      if (dimTimer) {
        clearTimeout(dimTimer);
        dimTimer = null;
      }
      stream.classList.add('bright');
    } else {
      if (stream.classList.contains('bright') && dimTimer === null) {
        dimTimer = setTimeout(() => {
          stream.classList.remove('bright');
          dimTimer = null;
        }, DIM_DELAY_MS);
      }
    }

    // Bottle popup logic
    if (isBottleDetected(state.detections)) {
      // Bottle present — show immediately, cancel any pending hide
      if (bottleTimer) {
        clearTimeout(bottleTimer);
        bottleTimer = null;
      }
      bottlePopup.classList.add('visible');
    } else {
      // Bottle gone — start hide timer if still visible and not already counting
      if (bottlePopup.classList.contains('visible') && bottleTimer === null) {
        bottleTimer = setTimeout(() => {
          bottlePopup.classList.remove('visible');
          bottleTimer = null;
        }, BOTTLE_HIDE_DELAY_MS);
      }
    }
  }

  async function poll() {
    try {
      const r = await fetch('/state');
      const state = await r.json();
      updateUI(state);
    } catch(e) {}
    setTimeout(poll, POLL_MS);
  }

  poll();
</script>
</body>
</html>
